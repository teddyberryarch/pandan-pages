function setStatus(msg, isOk) {
  document.getElementById('status').innerHTML =
    `<div class="status ${isOk ? 'ok' : 'err'}">${msg}</div>`;
}

async function testHealth() {
  try {
    const res = await fetch(`${BASE()}/health`);
    const data = await res.json();
    setStatus(`✅ 서버 응답: ${JSON.stringify(data)}`, true);
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    setStatus(`❌ 연결 실패: ${e.message}`, false);
  }
}

async function testCalculate() {
  setStatus('계산 중...', true);
  try {
    const res = await fetch(`${BASE()}/calculate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(PAYLOAD)
    });
    const data = await res.json();
    if (data.error) {
      setStatus(`❌ 에러: ${data.error}`, false);
    } else {
      setStatus(`✅ 계산 완료 — 주택 ${data.주택별?.length || 0}채`, true);
    }
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    setStatus(`❌ 실패: ${e.message}`, false);
  }
}

async function testSellOrder() {
  setStatus('매도순서 분석 중...', true);
  try {
    const res = await fetch(`${BASE()}/sell-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(PAYLOAD)
    });
    const data = await res.json();
    if (data.error) {
      setStatus(`❌ 에러: ${data.error}`, false);
    } else {
      const order = data.추천순서?.map(o => `${o.순위}위: ${o.주택} (${o.핵심이유})`).join('\n');
      setStatus(`✅ 매도 순서 분석 완료`, true);
      document.getElementById('result').textContent = order + '\n\n' + JSON.stringify(data, null, 2);
    }
  } catch(e) {
    setStatus(`❌ 실패: ${e.message}`, false);
  }
}
